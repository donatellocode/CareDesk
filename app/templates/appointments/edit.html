{% extends "base.html" %}

{% block title %}Edit Appointment - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ Edit Appointment</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="patient_id">Patient *</label>
            <select id="patient_id" name="patient_id" required>
                {% for patient in patients %}
                <option value="{{ patient.id }}" {% if patient.id == appointment.patient_id %}selected{% endif %}>
                    {{ patient.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" value="{{ appointment.date.strftime('%Y-%m-%d') }}" required>
        </div>
        
        <div class="form-group">
            <label for="time">Time *</label>
            <input type="time" id="time" name="time" value="{{ appointment.time }}" required>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="waiting" {% if appointment.status == 'waiting' %}selected{% endif %}>Waiting</option>
                <option value="completed" {% if appointment.status == 'completed' %}selected{% endif %}>Completed</option>
                <option value="cancelled" {% if appointment.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Update Appointment</button>
            <a href="{{ url_for('appointments.list') }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
