{% extends "base.html" %}

{% block title %}Edit Visit - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ Edit Visit</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="diagnosis">Diagnosis</label>
            <textarea id="diagnosis" name="diagnosis">{{ visit.diagnosis or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes">{{ visit.notes or '' }}</textarea>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Update Visit</button>
            <a href="{{ url_for('visits.view', id=visit.id) }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
