{% extends "base.html" %}

{% block title %}Record Visit - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>➕ Record Visit</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="patient_id">Patient *</label>
            <select id="patient_id" name="patient_id" required>
                <option value="">Select a patient...</option>
                {% for patient in patients %}
                <option value="{{ patient.id }}">{{ patient.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" value="{{ today }}" required>
        </div>
        
        <div class="form-group">
            <label for="appointment_id">Related Appointment (Optional)</label>
            <select id="appointment_id" name="appointment_id">
                <option value="">None</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="diagnosis">Diagnosis</label>
            <textarea id="diagnosis" name="diagnosis" placeholder="Enter diagnosis..."></textarea>
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Additional notes..."></textarea>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Save Visit</button>
            <a href="{{ url_for('visits.list') }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
