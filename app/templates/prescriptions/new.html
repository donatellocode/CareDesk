{% extends "base.html" %}

{% block title %}Create Prescription - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>➕ Create Prescription</h1>
</div>

<div class="card">
    <form method="POST" id="prescriptionForm">
        <div class="form-group">
            <label for="patient_id">Patient *</label>
            <select id="patient_id" name="patient_id" required>
                <option value="">Select a patient...</option>
                {% for patient in patients %}
                <option value="{{ patient.id }}">{{ patient.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
        </div>
        
        <div class="form-group">
            <label for="visit_id">Related Visit (Optional)</label>
            <select id="visit_id" name="visit_id">
                <option value="">None</option>
            </select>
        </div>
        
        <div class="card">
            <h3>Prescription Items</h3>
            <div id="prescriptionItems">
                <div class="item-row" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div style="flex: 2;">
                        <label>Medicine</label>
                        <select name="medicine_id" required>
                            <option value="">Select medicine...</option>
                            {% for medicine in medicines %}
                            <option value="{{ medicine.id }}">{{ medicine.name }} ({{ medicine.default_dose or 'no default' }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Dose</label>
                        <input type="text" name="dose" placeholder="e.g., 500mg">
                    </div>
                    <div style="flex: 1;">
                        <label>Instructions</label>
                        <input type="text" name="instructions" placeholder="e.g., Twice daily">
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-secondary" onclick="addItem()">+ Add Item</button>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Create Prescription</button>
            <a href="{{ url_for('prescriptions.list') }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>

<script>
function addItem() {
    const container = document.getElementById('prescriptionItems');
    const newItem = document.createElement('div');
    newItem.className = 'item-row';
    newItem.style.cssText = 'display: flex; gap: 1rem; margin-bottom: 1rem; margin-top: 1rem;';
    newItem.innerHTML = `
        <div style="flex: 2;">
            <label>Medicine</label>
            <select name="medicine_id" required>
                <option value="">Select medicine...</option>
                {% for medicine in medicines %}
                <option value="{{ medicine.id }}">{{ medicine.name }} ({{ medicine.default_dose or 'no default' }})</option>
                {% endfor %}
            </select>
        </div>
        <div style="flex: 1;">
            <label>Dose</label>
            <input type="text" name="dose" placeholder="e.g., 500mg">
        </div>
        <div style="flex: 1;">
            <label>Instructions</label>
            <input type="text" name="instructions" placeholder="e.g., Twice daily">
        </div>
    `;
    container.appendChild(newItem);
}
</script>
{% endblock %}
