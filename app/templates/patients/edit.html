{% extends "base.html" %}

{% block title %}Edit Patient - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ Edit Patient</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{ patient.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" value="{{ patient.age or '' }}" min="0" max="150">
        </div>
        
        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
                <option value="">Select...</option>
                <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" value="{{ patient.phone or '' }}">
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes">{{ patient.notes or '' }}</textarea>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Update Patient</button>
            <a href="{{ url_for('patients.view', id=patient.id) }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
