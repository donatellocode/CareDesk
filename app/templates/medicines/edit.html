{% extends "base.html" %}

{% block title %}Edit Medicine - CareDesk{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ Edit Medicine</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{ medicine.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ medicine.category or '' }}">
        </div>
        
        <div class="form-group">
            <label for="default_dose">Default Dose</label>
            <input type="text" id="default_dose" name="default_dose" value="{{ medicine.default_dose or '' }}">
        </div>
        
        <div class="form-group">
            <label for="instructions">Instructions</label>
            <textarea id="instructions" name="instructions">{{ medicine.instructions or '' }}</textarea>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Update Medicine</button>
            <a href="{{ url_for('medicines.list') }}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
